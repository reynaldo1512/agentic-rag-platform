services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_PORT=${API_PORT:-8000}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentic-rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-rag-frontend
    ports:
      - "5173:5173"
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    networks:
      - agentic-rag-network

networks:
  agentic-rag-network:
    driver: bridge
